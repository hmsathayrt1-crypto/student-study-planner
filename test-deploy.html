<!DOCTYPE html>
<html>
<head>
    <title>Test Study Plan API</title>
</head>
<body>
    <h1>Testing Student Study Planner API</h1>
    <button onclick="testAPI()">Test API</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://student-study-planner.pages.dev/api/generate-plan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        studyMaterials: 'Chapter 1: Introduction to Python\n- Variables and data types\n- Control flow\n- Functions',
                        deadline: '2026-03-21',
                        dailyHours: 2
                    })
                });
                
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
